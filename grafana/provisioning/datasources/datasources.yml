apiVersion: 1

datasources:
  - name: Prometheus
    uid: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Postgres
    uid: Postgres
    type: postgres
    access: proxy
    url: host.docker.internal:5434
    user: admin
    secureJsonData:
      password: password
    jsonData:
      database: infra_ops
      sslmode: disable
      postgresVersion: 1500
      timescaledb: false
    editable: false
